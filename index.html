<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1b2e;--bg2:#0f2540;--border:#1e3a5f;--green:#00C67A;--blue:#3b82f6;--text:#e2e8f0;--muted:#7ea8cc;--dim:#8fb4d4;--red:#ef4444;--amber:#f59e0b}
html{scroll-behavior:smooth}
body{background:linear-gradient(160deg,#0d1b2e 0%,#112240 50%,#0d1b2e 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.header{background:linear-gradient(135deg,#0f2540,#0d1b2e);border-bottom:1px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100}
.header-inner{max-width:980px;margin:0 auto}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:4px;flex-wrap:wrap}
.logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#00C67A,#1e40af);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.subtitle{font-size:11px;color:var(--muted);margin-top:2px}
.data-status{font-size:10px;padding:4px 8px;border-radius:4px;margin-left:auto}
.data-status.live{background:rgba(0,198,122,.15);color:var(--green)}
.data-status.cached{background:rgba(245,158,11,.15);color:var(--amber)}
.live-badge{display:none;align-items:center;gap:6px;font-size:11px;color:var(--red);font-weight:600}
.live-dot{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;margin-top:14px;overflow-x:auto}
.tab{padding:10px 16px;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}
.content{max-width:980px;margin:0 auto;padding:20px 16px 60px}
.legend{display:flex;gap:16px;margin-bottom:16px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.group-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;scroll-margin-top:100px;transition:box-shadow .4s}
.group-header{padding:10px 14px;background:linear-gradient(90deg,#1a3a5c,#0f2540);display:flex;align-items:center;gap:8px}
.group-label{font-weight:700;font-size:13px;letter-spacing:1px}
.live-pill{font-size:10px;background:var(--red);color:#fff;border-radius:4px;padding:2px 6px;animation:pulse 1.5s infinite}
.gtable{width:100%;border-collapse:collapse;font-size:12px}
.gtable thead tr{color:var(--muted);border-bottom:1px solid var(--border)}
.gtable th{padding:6px;text-align:center;font-weight:500}
.gtable th:first-child{padding-left:14px;text-align:left}
.gtable td{padding:8px 6px;text-align:center;color:var(--muted)}
.gtable td:first-child{padding-left:14px;text-align:left}
.gtable tbody tr{border-bottom:1px solid var(--border)}
.gtable tbody tr:last-child{border-bottom:none}
.gtable tbody tr.q{background:rgba(0,198,122,.04)}
.tcell{display:flex;align-items:center;gap:6px}
.rbar{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.pts1{font-weight:700;color:var(--green);font-size:13px}
.pts0{font-weight:700;color:var(--dim);font-size:13px}
.ufooter{padding:8px 14px;border-top:1px solid var(--border)}
.umatch{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;padding:2px 0}
.info-box{background:var(--bg2);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;gap:10px;font-size:12px;color:#94a3b8;line-height:1.6}
.bwrap{width:100%;overflow-x:auto;padding-bottom:16px}
.bracket{display:flex;min-width:860px}
.bround{flex:1;display:flex;flex-direction:column}
.bround-hdr{text-align:center;padding:10px 6px;font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--green);background:var(--bg2);border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.bmatches{display:flex;flex-direction:column;flex:1;justify-content:space-around;padding:8px 4px}
.bmatch{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin:3px;overflow:hidden}
.bmatch.fin{border-color:var(--green);background:rgba(0,198,122,.06)}
.bmatch.sf{border-color:var(--blue)}
.bnum{font-size:9px;color:var(--muted);padding:3px 8px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);letter-spacing:.5px}
.bteam{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;gap:3px}
.bteam:first-of-type{border-bottom:1px solid var(--border)}
.bname{font-size:11px;display:flex;align-items:center;gap:3px;color:var(--text);flex:1;min-width:0}
.bname.tbd{color:var(--muted);font-style:italic}
.bname .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bscore{font-size:12px;font-weight:700;color:var(--green);min-width:14px;text-align:right;flex-shrink:0}
.bwin{background:rgba(0,198,122,.12);border-left:2px solid var(--green)}
.bdate{font-size:9px;color:var(--muted);padding:2px 8px 4px;text-align:center}
.grplink{background:rgba(30,58,95,.7);border:1px solid #2a5080;border-radius:4px;color:var(--muted);font-size:9px;padding:1px 5px;cursor:pointer;font-weight:600;white-space:nowrap;flex-shrink:0}
.grplink:hover{background:#1e3a5f;color:#cce4ff}

.last-upd{text-align:center;font-size:11px;color:var(--muted);margin-top:30px}
.bconf{display:flex;align-items:center;gap:4px;margin:0 7px 3px}
.bconf-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.bconf-fill{height:100%;border-radius:2px;transition:width .6s}
.bconf-pct{font-size:9px;color:var(--muted);min-width:24px;text-align:right}
.bconf-label{font-size:9px;color:var(--amber);padding:1px 7px 3px;font-style:italic}
.bconf{display:flex;align-items:center;gap:4px;margin-top:3px;padding:0 7px 4px}
.bconf-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.bconf-fill{height:100%;border-radius:2px;transition:width .6s}
.bconf-pct{font-size:9px;color:var(--muted);min-width:24px;text-align:right}
.bconf-label{font-size:9px;color:var(--amber);padding:1px 7px 3px;font-style:italic}
</style>
</head>

</div>

    card.innerHTML='<div class="group-header"><span class="group-label">GRUPO '+gr+'</span>'+(isLive?'<span class="live-pill">EN VIVO</span>':'')+'</div><table class="gtable"><thead><tr><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>DG</th><th>Pts</th></tr></thead><tbody>'+rows+'</tbody></table>'+upH;

function findRes(t1n,t2n){
  if(!t1n||!t2n)return null;
  var t1=fix(t1n),t2=fix(t2n);
  var m=matches.find(function(m){var a=fix(m.team1),b=fix(m.team2);return (a===t1&&b===t2)||(a===t2&&b===t1);});
  if(!m||!m.score||!m.score.ft)return null;
  return fix(m.team1)===t1?m.score.ft:[m.score.ft[1],m.score.ft[0]];
}
function winOf(t1,t2){if(!t1||!t2)return null;var r=findRes(t1.name,t2.name);if(!r)return null;return r[0]>r[1]?t1:r[1]>r[0]?t2:null;}
function sl(pos,gr){if(!standings||!standings[gr])return null;return standings[gr][pos]||null;}
function computeConf(grpId,pos){
  if(!standings||!standings[grpId])return 30;
  var teams=standings[grpId],t=teams[pos],nx=teams[pos+1];
  if(!t)return 20;
  var gap=nx?t.pts-nx.pts:t.pts,gl=3-t.pj;
  return Math.max(15,Math.min(97,Math.round(40+t.pts*8+gap*10-gl*5)));
}

}

function computeConf(grpId,pos){
  if(!standings||!standings[grpId])return 30;

  if(!t)return 20;
  var gap=nx?t.pts-nx.pts:t.pts,gl=3-t.pj;
  return Math.max(15,Math.min(97,Math.round(40+t.pts*8+gap*10-gl*5)));
}
function buildM(m,cls){
  var t1=m.t1,t2=m.t2;
  var tb1=!t1||t1._tbd,tb2=!t2||t2._tbd;
  var n1=t1&&!t1._tbd?en(t1.name):t1?t1.name:'Por definir';
  var n2=t2&&!t2._tbd?en(t2.name):t2?t2.name:'Por definir';
  var f1=t1&&!t1._tbd?fl(t1.name):'?';
  var f2=t2&&!t2._tbd?fl(t2.name):'?';
  var res=findRes(t1&&!t1._tbd?t1.name:null,t2&&!t2._tbd?t2.name:null);
  var w1=res&&res[0]>res[1],w2=res&&res[1]>res[0];
  var lk1=m.g1?'<button class="grplink" onclick="goToGroup(\''+m.g1+'\')">Gr.'+m.g1+'</button>':'';
  var lk2=m.g2?'<button class="grplink" onclick="goToGroup(\''+m.g2+'\')">Gr.'+m.g2+'</button>':'';
  var c1bar='',c2bar='';
  if(!res){
    if(tb1){
      c1bar='<div class="bconf-label">¿Quien clasifica 3°?</div>';
    } else if(m.g1!==null&&m.g1!==undefined){
      var pos1=m.p1!==undefined?m.p1:0;
      var cv1=computeConf(m.g1,pos1);
      if(cv1<97)c1bar='<div class="bconf"><div class="bconf-track"><div class="bconf-fill" style="width:'+cv1+'%;background:#00C67A"></div></div><span class="bconf-pct">'+cv1+'%</span></div>';
    }
    if(tb2){
      c2bar='<div class="bconf-label">¿Quien clasifica 3°?</div>';
    } else if(m.g2!==null&&m.g2!==undefined){
      var pos2=m.p2!==undefined?m.p2:1;
      var cv2=computeConf(m.g2,pos2);
      if(cv2<97)c2bar='<div class="bconf"><div class="bconf-track"><div class="bconf-fill" style="width:'+cv2+'%;background:#3b82f6"></div></div><span class="bconf-pct">'+cv2+'%</span></div>';
    }
  }
  return '<div class="bmatch'+(cls?' '+cls:'')+'">'
    +'<div class="bnum">P'+m.num+'</div>'
    +'<div class="bteam'+(w1?' bwin':'')+'"><div class="bname'+(tb1?' tbd':'')+'"><span>'+f1+'</span><span class="nm">'+n1+'</span></div>'+lk1+'<span class="bscore">'+(res?res[0]:'')+'</span></div>'
    +c1bar
    +'<div class="bteam'+(w2?' bwin':'')+'"><div class="bname'+(tb2?' tbd':'')+'"><span>'+f2+'</span><span class="nm">'+n2+'</span></div>'+lk2+'<span class="bscore">'+(res?res[1]:'')+'</span></div>'
    +c2bar
    +(m.date?'<div class="bdate">'+m.date+'</div>':'')+'</div>';
}

function buildRound(el,title,ms,cls){
  var col=document.createElement('div');col.className='bround';
  var h='<div class="bround-hdr">'+title+'</div><div class="bmatches">';
  ms.forEach(function(m){h+=buildM(m,cls||'');});
  col.innerHTML=h+'</div>';el.appendChild(col);
}
